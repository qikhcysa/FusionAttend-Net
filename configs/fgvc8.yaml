dataset:
  name: fgvc8
  root: data/fgvc8
  image_size: 224
  num_workers: 4
  balance_classes: true

model:
  num_classes: 12
  in_channels: 3
  width_multiple: 0.5
  depth_multiple: 0.33
  psa_reduction: 16
  psa_pyramid_levels: [1, 2, 4, 8]
  dropout: 0.3

training:
  epochs: 100
  batch_size: 32
  k_folds: 4
  seed: 42

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001

scheduler:
  name: cosine
  warmup_epochs: 5

output:
  save_dir: outputs/fgvc8
  log_interval: 10
